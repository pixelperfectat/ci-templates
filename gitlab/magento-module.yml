# Reusable CI pipeline for a PixelPerfect Magento module.
#
# Consume from a module's .gitlab-ci.yml:
#   include:
#     - project: pixelperfect-at-m2-modules/ci-templates
#       ref: main
#       file: /gitlab/magento-module.yml
#
# Required CI/CD variables on the module project (masked):
#   MAGENTO_PUBLIC_KEY  / MAGENTO_PRIVATE_KEY   → Composer http-basic for repo.magento.com
# Private inter-module deps (coding-standard, other pixelperfectat modules) are cloned via the
# built-in CI_JOB_TOKEN — allowlist this group under each depended-on repo's CI/CD → Token Access.

image: markoshust/magento-php:8.3-fpm

stages:
  - validate
  - lint
  - analyse
  - test
  - release

variables:
  COMPOSER_ALLOW_SUPERUSER: "1"
  COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer-cache"

default:
  cache:
    key: composer-$CI_COMMIT_REF_SLUG
    paths:
      - vendor/
      - .composer-cache/
  before_script:
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
    - composer config --global --auth http-basic.repo.magento.com "$MAGENTO_PUBLIC_KEY" "$MAGENTO_PRIVATE_KEY"
    - composer config --global --auth http-basic.gitlab.com gitlab-ci-token "$CI_JOB_TOKEN"
    - composer install --no-interaction --no-progress --no-ansi

commitlint:
  stage: validate
  image: alpine:latest
  cache: []
  before_script:
    - apk add --no-cache git
  variables:
    GIT_DEPTH: "50"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_TAG == null
  script:
    - |
      # Determine the range of commits to check.
      # MR pipeline: use the diff-base provided by GitLab.
      # Branch push: use CI_COMMIT_BEFORE_SHA; skip if all-zeros (new branch / first push).
      ZERO="0000000000000000000000000000000000000000"

      if [ -n "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]; then
        BASE="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
      elif [ "$CI_COMMIT_BEFORE_SHA" = "$ZERO" ] || [ -z "$CI_COMMIT_BEFORE_SHA" ]; then
        # New branch or first push — check only the tip commit.
        BASE=""
      else
        BASE="$CI_COMMIT_BEFORE_SHA"
      fi

      check_commit() {
        SUBJECT="$1"
        BODY="$2"
        FULL_MSG="${SUBJECT}
      ${BODY}"
        FAILED=0

        # Rule 1: keyword-first subject — Merge commits are exempt from this rule only
        IS_MERGE=0
        if printf '%s' "$SUBJECT" | grep -qE '^Merge (branch|remote-tracking) '; then
          IS_MERGE=1
        fi
        # PR/MR merge-preview commit: "Merge <sha> into <sha>"
        if printf '%s' "$SUBJECT" | grep -qE '^Merge [0-9a-f]+ into [0-9a-f]+$'; then
          IS_MERGE=1
        fi

        if [ "$IS_MERGE" -eq 0 ]; then
          KEYWORD_RE='^(Add|Implement|Introduce|Update|Refactor|Improve|Change|Bump|Deprecate|Remove|Delete|Drop|Fix|Correct|Resolve|Security) .+'
          ISSUE_RE='^\[[^]]+\] (Add|Implement|Introduce|Update|Refactor|Improve|Change|Bump|Deprecate|Remove|Delete|Drop|Fix|Correct|Resolve|Security) .+'
          if ! printf '%s' "$SUBJECT" | grep -qE "$KEYWORD_RE|$ISSUE_RE"; then
            printf 'ERROR: Subject does not start with a house keyword: %s\n' "$SUBJECT" >&2
            FAILED=1
          fi
        fi

        return $FAILED
      }

      if [ -n "$BASE" ]; then
        git fetch --depth=50 origin "$BASE" 2>/dev/null || true
        COMMITS="$(git log --format="%H" "${BASE}..${CI_COMMIT_SHA}" 2>/dev/null)"
      else
        # New branch / first push — check the tip commit only
        COMMITS="$CI_COMMIT_SHA"
      fi

      # Avoid pipe-subshell: write SHAs to a temp file then iterate
      TMPFILE="$(mktemp)"
      printf '%s\n' "$COMMITS" > "$TMPFILE"

      FAILED_TOTAL=0
      while IFS= read -r SHA; do
        [ -z "$SHA" ] && continue
        SUBJECT="$(git log -1 --format="%s" "$SHA")"
        BODY="$(git log -1 --format="%b" "$SHA")"
        if ! check_commit "$SUBJECT" "$BODY"; then
          FAILED_TOTAL=1
        fi
      done < "$TMPFILE"
      rm -f "$TMPFILE"

      if [ "$FAILED_TOTAL" -ne 0 ]; then
        exit 1
      fi

validate:
  stage: validate
  script:
    - composer ci:validate

lint:
  stage: lint
  script:
    - composer lint
    - composer cs

analyse:
  stage: analyse
  script:
    - composer stan

test:
  stage: test
  script:
    - composer test

# On a semver tag push, publish a GitLab Release using the matching CHANGELOG.md section.
create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  cache: []
  before_script: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
  script:
    - |
      if [ -f CHANGELOG.md ]; then
        awk "/^## \\[${CI_COMMIT_TAG}\\]/{f=1;next} /^## \\[/{if(f)exit} f" CHANGELOG.md > release_notes.md
      fi
      [ -s release_notes.md ] || printf "Release %s\n" "$CI_COMMIT_TAG" > release_notes.md
      cat release_notes.md
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Version $CI_COMMIT_TAG"
    description: release_notes.md

name: Magento module CI

# Reusable workflow for PixelPerfect Magento modules on GitHub (the OSS ones).
# Consume from a module's .github/workflows/ci.yml:
#   jobs:
#     ci:
#       uses: pixelperfect-at-m2-modules/ci-templates/.github/workflows/magento-module.yml@main
#       secrets: inherit
# Requires secrets: MAGENTO_PUBLIC_KEY, MAGENTO_PRIVATE_KEY (+ GITLAB_TOKEN if the module has a
# private GitLab dependency, e.g. pixelperfectat/coding-standard).
# Note: GitHub reusable workflows must live in a GitHub repo — this file works once ci-templates
# is mirrored to GitHub. Private GitLab-hosted modules use /gitlab/magento-module.yml instead.

on:
  workflow_call:
    secrets:
      MAGENTO_PUBLIC_KEY:
        required: true
      MAGENTO_PRIVATE_KEY:
        required: true
      GITLAB_TOKEN:
        required: false

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Lint commit messages (keyword format)
        run: |
          # Determine the range of commits to check.
          # PR pipeline: use the PR base SHA.
          # Push pipeline: use BEFORE_SHA; fall back to tip-only on a new branch.
          ZERO="0000000000000000000000000000000000000000"

          if [ -n "${{ github.event.pull_request.base.sha }}" ] && \
             [ "${{ github.event.pull_request.base.sha }}" != "$ZERO" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ -n "${{ github.event.before }}" ] && \
               [ "${{ github.event.before }}" != "$ZERO" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE=""
          fi

          check_commit() {
            SUBJECT="$1"
            BODY="$2"
            FULL_MSG="${SUBJECT}
          ${BODY}"
            FAILED=0

            # Rule 1: keyword-first subject — Merge commits are exempt from this rule only
            IS_MERGE=0
            if printf '%s' "$SUBJECT" | grep -qE '^Merge (branch|remote-tracking) '; then
              IS_MERGE=1
            fi

            if [ "$IS_MERGE" -eq 0 ]; then
              KEYWORD_RE='^(Add|Implement|Introduce|Update|Refactor|Improve|Change|Bump|Deprecate|Remove|Delete|Drop|Fix|Correct|Resolve|Security) .+'
              ISSUE_RE='^\[[^]]+\] (Add|Implement|Introduce|Update|Refactor|Improve|Change|Bump|Deprecate|Remove|Delete|Drop|Fix|Correct|Resolve|Security) .+'
              if ! printf '%s' "$SUBJECT" | grep -qE "$KEYWORD_RE|$ISSUE_RE"; then
                printf 'ERROR: Subject does not start with a house keyword: %s\n' "$SUBJECT" >&2
                FAILED=1
              fi
            fi

            return $FAILED
          }

          if [ -n "$BASE" ]; then
            COMMITS="$(git log --format="%H" "${BASE}..HEAD" 2>/dev/null)"
          else
            COMMITS="$(git rev-parse HEAD)"
          fi

          TMPFILE="$(mktemp)"
          printf '%s\n' "$COMMITS" > "$TMPFILE"

          FAILED_TOTAL=0
          while IFS= read -r SHA; do
            [ -z "$SHA" ] && continue
            SUBJECT="$(git log -1 --format="%s" "$SHA")"
            BODY="$(git log -1 --format="%b" "$SHA")"
            if ! check_commit "$SUBJECT" "$BODY"; then
              FAILED_TOTAL=1
            fi
          done < "$TMPFILE"
          rm -f "$TMPFILE"

          if [ "$FAILED_TOTAL" -ne 0 ]; then
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3 (+ Magento extensions)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, gd, hash, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sodium, xsl, zip, fileinfo
          tools: composer
          coverage: none

      - name: Auth git for private GitLab dependencies
        if: ${{ secrets.GITLAB_TOKEN != '' }}
        run: git config --global url."https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/".insteadOf "https://gitlab.com/"

      - name: Authenticate Composer for repo.magento.com
        run: composer config --global --auth http-basic.repo.magento.com "${{ secrets.MAGENTO_PUBLIC_KEY }}" "${{ secrets.MAGENTO_PRIVATE_KEY }}"

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --no-ansi

      - name: composer validate
        run: composer ci:validate

      - name: Lint + coding standard
        run: |
          composer lint
          composer cs

      - name: Static analysis
        run: composer stan

      - name: Unit tests
        run: composer test
